<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Depunere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
background:white;
font-family:'Poppins',sans-serif;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
border:2px solid #8B5A2B;
border-radius:20px;
padding:25px;
text-align:center;
}

h1{
color:#8B5A2B;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#8B5A2B;
color:white;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:20px;
border:2px solid #8B5A2B;
width:90%;
max-width:320px;
text-align:center;
}

.popup-content p,a{
color:#8B5A2B;
font-weight:600;
display:block;
margin-top:10px;
word-break:break-word;
}

.back{
margin-top:25px;
}
</style>
</head>

<body>

<div class="container">

<h1>Depunere</h1>

<button onclick="bankPopup()">Cont bancar</button>

<button onclick="cryptoPopup()">Plată Crypto</button>

<button onclick="cardPopup()">Plată cu cardul</button>

<button onclick="cashPopup()">Livrare numerar</button>

<button class="back" onclick="location.href='homepage.html'">Înapoi</button>

</div>

<div class="popup" id="popup">
<div class="popup-content" id="popupContent"></div>
</div>

<script>
function openPopup(content){
document.getElementById("popup").style.display="flex";
document.getElementById("popupContent").innerHTML=content;
}

function bankPopup(){
openPopup(`
<p>Scrie managerului pentru detalii bancare</p>
<button onclick="closePopup()">OK</button>
`);
}

function cryptoPopup(){
openPopup(`
<p>Linkuri pentru plată crypto:</p>
<a href="https://paybis.com" target="_blank">Paybis</a>
<a href="https://mercuryo.io" target="_blank">Mercuryo</a>
<button onclick="closePopup()">OK</button>
`);
}

function cardPopup(){
openPopup(`
<p>Scrie managerului pentru detalii</p>
<button onclick="closePopup()">OK</button>
`);
}

function cashPopup(){
openPopup(`
<p>Scrie managerului pentru detalii</p>
<button onclick="closePopup()">OK</button>
`);
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
