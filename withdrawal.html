<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retragere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
background:white;
font-family:'Poppins',sans-serif;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.box{
border:2px solid #8B5A2B;
border-radius:20px;
padding:20px;
margin-bottom:25px;
}

h2{
color:#8B5A2B;
text-align:center;
margin-bottom:18px;
}

input,select{
width:100%;
padding:14px;
margin-top:12px;
border:2px solid #8B5A2B;
border-radius:12px;
font-size:15px;
outline:none;
}

.amount{
color:black;
font-size:30px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#8B5A2B;
color:white;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

.text{
color:#8B5A2B;
font-size:15px;
line-height:1.7;
text-align:center;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:20px;
border:2px solid #8B5A2B;
width:90%;
max-width:320px;
text-align:center;
}

.popup-content p{
color:#8B5A2B;
font-weight:600;
line-height:1.7;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="box">

<h2>Retragere bancară</h2>

<input type="text" placeholder="Nume cont">

<input type="text" placeholder="Număr cont">

<select>
<option>Revolut</option>
<option>IBAN</option>
<option>Banca Transilvania</option>
<option>BRD</option>
<option>CEC Bank</option>
<option>Raiffeisen Bank</option>
<option>ING Bank</option>
<option>UniCredit Bank</option>
<option>Alpha Bank</option>
<option>OTP Bank</option>
<option>Garanti BBVA</option>
<option>Libra Bank</option>
</select>

<div class="amount">88,600 RON</div>

<button onclick="showPopup()">Retrage</button>

</div>

<div class="box">

<h2>Livrare numerar</h2>

<div class="text">
Scrie managerului pentru a procesa retragerea prin livrare.
</div>

</div>

<button onclick="location.href='homepage.html'">Înapoi la pagina principală</button>

</div>

<div class="popup" id="popup">
<div class="popup-content">
<p>
Depuneți o taxă de 2600 RON pentru procesarea retragerii și pentru acoperirea taxelor TVA și blockchain pentru retrageri rapide.
</p>

<button onclick="closePopup()">OK</button>
</div>
</div>

<script>
function showPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
