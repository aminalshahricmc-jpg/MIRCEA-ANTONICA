<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEANU REEVES COMPANY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:400px;
border:2px solid #8B5A2B;
border-radius:20px;
padding:30px 20px;
text-align:center;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

h1{
color:#8B5A2B;
margin-bottom:25px;
font-size:28px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:2px solid #8B5A2B;
border-radius:12px;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:14px;
background:#8B5A2B;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:20px;
border:2px solid #8B5A2B;
text-align:center;
width:90%;
max-width:300px;
}

.popup-content p{
color:#8B5A2B;
font-weight:600;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>KEANU REEVES COMPANY</h1>

<input type="text" value="Mircea Antonica" readonly>

<input type="email" value="mirceaantonica@gmail.com" readonly>

<input type="password" id="password" placeholder="Parolă">

<button onclick="login()">Autentificare</button>

</div>

<div class="popup" id="popup">
<div class="popup-content">
<p id="popupText"></p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>
function login(){
let password=document.getElementById("password").value;

if(password==="MirceaReeves"){
window.location.href="homepage.html";
}else{
document.getElementById("popup").style.display="flex";
document.getElementById("popupText").innerText="Parolă incorectă";
}
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
